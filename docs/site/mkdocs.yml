site_name: Forward V5 Mission Control
site_description: Trading System Status & Documentation
site_url: https://pecz.pages.dev
repo_url: https://github.com/dpxyz/pecz
copyright: "Copyright &copy; 2026"

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
  features:
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    logo: material/rocket-launch

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - tables
  - admonition
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/dashboard.css

nav:
  - "🎯 Dashboard": index.md
  - "🗺️ Roadmap": roadmap.md
  - "🚧 Blockers": blockers.md
  - "📖 Docs":
    - "📋 Phases": phases.md
    - "🏗️ Architecture":
      - "ADR-001: Target Architecture": architecture/adr-001.md
      - "ADR-002: Observability": architecture/adr-002.md
      - "ADR-003: State Model": architecture/adr-003.md
      - "ADR-004: Risk Controls": architecture/adr-004.md
      - "ADR-005: Three-Layer": architecture/adr-005.md
      - "ADR-006: Paper Trading": architecture/adr-006.md
      - "ADR-007: Leverage Tiers": architecture/adr-007.md
    - "🔬 Strategy Lab":
      - "Overview": strategy-lab/index.md
      - "Phase 7 Report": strategy-lab/PHASE7_ACCEPTANCE_REPORT.md
      - "Baseline Strategy": strategy-lab/baseline.md
    - "💰 Economics": economics.md
    - "🧪 Test Suite": test-suite.md
    - "🔮 V2 Design": v2-design.md
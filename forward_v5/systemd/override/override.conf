# Drop-In Override für forward_v5.service
# Place this file in: /etc/systemd/system/forward_v5.service.d/override.conf
#
# sudo systemctl edit forward_v5
# Oder manuell:
# sudo mkdir -p /etc/systemd/system/forward_v5.service.d/
# sudo cp override.conf /etc/systemd/system/forward_v5.service.d/
# sudo systemctl daemon-reload

[Service]

# Beispiel: Extended Environment (wird mit EnvironmentFile kombiniert)
Environment="FORWARD_LOG_LEVEL=debug"
Environment="FORWARD_ENABLE_METRICS=true"

# Beispiel: Erweiterte Restart-Policy
# RestartSec=20
# StartLimitBurst=5

# Beispiel: Angepasste Timeouts
# TimeoutStartSec=60
# TimeoutStopSec=30

# Beispiel: Zusätzliche ReadWrite-Pfade (falls nötig)
# ReadWritePaths=/var/lib/openclaw

# Beispiel: Memory Limits
# MemoryMax=512M
# MemorySwapMax=0

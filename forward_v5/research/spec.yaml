# Phase 7 v0.2 – Strategy Specification (V1 realistic thresholds)
# Mensch definiert WAS, nicht WIE

# ── Profitability ──
profitability:
  min_return_pct: 2.0          # V1: 2% netto (realistisch für 6 Monate)
  min_profit_factor: 1.2       # V1: PF > 1.2 (nicht 1.5)
  min_expectancy: 0.001        # V1: positiv reicht
  min_trades: 30               # V1: 30 Trades (statistisch relevant)

# ── Risk ──
risk:
  max_drawdown_pct: 25.0        # V1: 25% DD erlaubt
  min_return_dd_ratio: 0.08     # V1: 2%/25% = 0.08
  max_consecutive_losses: 10    # V1: 10 max

# ── Robustness ──
robustness:
  wf_windows_profitable: 2      # Mindestens 2 von 3 Walk-Forward Windows
  wf_max_degradation_pct: 60    # V1: 60% Degradation erlaubt
  min_sharpe_ratio: 0.2         # V1: 0.2 (positiv reicht)

# ── Resources ──
resources:
  max_memory_mb: 256            # VPS-Limit
  max_execution_s: 30           # Pro Run
  max_cpu_pct: 50               # Durchschnitt

# ── Guardrails ──
guardrails:
  max_param_combinations: 50    # Gegen Overfitting
  max_assets: 3                 # Gegen Komplexität
  max_lookback_bars: 500        # Gegen Data-Mining

# ── Asset Universe ──
assets:
  - BTCUSDT
  - ETHUSDT
  - SOLUSDT

# ── Timeframe ──
timeframe: 1h

# ── Data Range ──
backtest_period: "2024-01-01 to 2024-12-31"

# ── Fees & Slippage ──
fees:
  fee_rate: 0.0005            # 0.05% pro Trade (Binance taker)
  slippage_bps: 5.0          # 5 Basis-Punkte Slippage

# ── Data ──
data:
  path: "/data/.openclaw/workspace/forward_v5/forward_v5/research/data"
  format: "parquet"           # {SYMBOL}_{TIMEFRAME}.parquet
  columns: ["timestamp", "open", "high", "low", "close", "volume"]

# ── Evolution Settings ──
evolution:
  max_iterations: 5
  candidates_per_iteration: 3
  mode: "weekly"              # Wöchentlicher Foundry-Run